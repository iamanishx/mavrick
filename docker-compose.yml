version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: axeai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - axeai-network

  bot-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axeai-server
    command: bun run src/http-server.ts
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_DIR=/app/data
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - axeai-network

  bot-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axeai-worker
    command: bun run src/worker.ts
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_DIR=/app/data
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - axeai-network

volumes:
  redis-data:
    driver: local

networks:
  axeai-network:
    driver: bridge
