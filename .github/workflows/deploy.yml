name: Mavrick Production CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Multi-Platform Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mavrick-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-k3s:
    name: Deploy Workloads to K3s Cluster
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Substitute Secrets and Deploy
        run: |
          # Apply base cluster configurations, SA, and RBAC roles
          kubectl apply -f k8s-deployment.yaml
          
          # Force rollout restart of deployments to instantly pull the new latest image
          kubectl rollout restart deployment/mavrick-server -n mavrick
          kubectl rollout restart deployment/mavrick-worker -n mavrick
